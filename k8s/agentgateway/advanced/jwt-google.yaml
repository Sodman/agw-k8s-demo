# ===========================================================================
# ADVANCED step — authenticate real users with their Google (@solo.io) identity,
# and authorize by verified email. This mirrors the standalone config's
# `llm.policies.jwtAuth` + `authorization`.
#
# Mint a token for testing with:   gcloud auth print-identity-token
# (that token's `aud` is Google's gcloud client id, set in `audiences` below.)
#
# Applying this file evolves the Level-1 (static API key) setup into Level-2:
#   * API keys still work, but become OPTIONAL...
#   * ...because the authorization rule now accepts EITHER a verified @solo.io
#     JWT OR a valid API key. Anything else is rejected.
#
# Delete the step-7 `apikey-auth` policy first so only one apiKeyAuthentication
# config is active on the Gateway (the merged policy below sets mode: Optional).
# ===========================================================================

# --- A static backend the gateway uses to fetch Google's JWKS (signing keys) ---
# Remote JWKS must be reached via a backendRef (there is no "paste a URL" field).
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: google-oauth
  namespace: agentgateway-system
spec:
  static:
    host: www.googleapis.com
    port: 443
---
# Initiate TLS when talking to www.googleapis.com (system CAs, SNI auto-set).
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: google-oauth-tls
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: google-oauth
  backend:
    tls: {}
---
# JWT validation (optional), relaxed API-key auth (optional), and the CEL
# authorization rule — one Gateway policy, applied together.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: llm-access-control
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  traffic:
    jwtAuthentication:
      mode: Optional
      providers:
        - issuer: https://accounts.google.com
          audiences:
            # Google's gcloud CLI client id — the `aud` of tokens from
            # `gcloud auth print-identity-token`. Replace with your own OAuth
            # client id if you mint tokens a different way.
            - "32555940559.apps.googleusercontent.com"
          jwks:
            remote:
              backendRef:
                group: agentgateway.dev
                kind: AgentgatewayBackend
                name: google-oauth
                port: 443
              jwksPath: /oauth2/v3/certs
              cacheDuration: 5m
    apiKeyAuthentication:
      mode: Optional
      location:
        header:
          name: X-API-Key
      secretRef:
        name: agentgateway-apikeys
    authorization:
      action: Allow
      policy:
        matchExpressions:
          # Replace @solo.io with your own domain that you would like to allow users from
          - '(has(jwt.email) && jwt.email.endsWith("@solo.io") && jwt.email_verified) || has(apiKey.user)'

