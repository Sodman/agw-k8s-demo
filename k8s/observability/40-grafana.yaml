---
# Grafana — provisions two datasources (Prometheus + ClickHouse) and two dashboards.
# The ClickHouse datasource requires the grafana-clickhouse-datasource plugin, installed
# at startup via GF_INSTALL_PLUGINS (needs internet egress on first boot to fetch the plugin).

# ---- Datasource provisioning ----
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          timeInterval: 15s

      - name: ClickHouse
        uid: clickhouse
        type: grafana-clickhouse-datasource
        access: proxy
        jsonData:
          host: clickhouse
          port: 9000
          protocol: native
          secure: false
          username: default
          defaultDatabase: otel
          dialTimeout: 10
          queryTimeout: 60
          # Point the logs explorer at the otel schema produced by the exporter.
          logs:
            defaultDatabase: otel
            defaultTable: otel_logs
            otelEnabled: true
            otelVersion: latest
        secureJsonData:
          password: ""
---
# ---- Dashboard provider (tells Grafana to load JSON from a directory) ----
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: observability
  labels:
    app: grafana
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: agentgateway-demo
        orgId: 1
        folder: Agentgateway
        type: file
        disableDeletion: false
        editable: true
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        # Grafana image runs as uid 472; emptyDir needs to be writable by it.
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.6.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            # Installs the ClickHouse datasource plugin on first boot (requires egress).
            - name: GF_INSTALL_PLUGINS
              value: grafana-clickhouse-datasource
            # Optional: enable anonymous read-only viewing for the demo audience.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: storage
          emptyDir: {}
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-json
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
