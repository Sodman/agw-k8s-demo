apiVersion: v1
data:
  clickhouse-logs.json: |
    {
      "uid": "agentgw-clickhouse",
      "title": "Agentgateway — Access logs (ClickHouse)",
      "schemaVersion": 39,
      "version": 2,
      "editable": true,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "5s",
      "panels": [
        {
          "id": 1,
          "type": "table",
          "title": "Requests by team & user (cost attribution)",
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "grafana-clickhouse-datasource", "uid": "clickhouse" },
          "options": { "showHeader": true },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-clickhouse-datasource", "uid": "clickhouse" },
              "queryType": "table",
              "rawSql": "SELECT LogAttributes['org'] AS org, LogAttributes['user_email'] AS user_email, count() AS requests FROM otel.otel_logs GROUP BY org, user_email ORDER BY requests DESC",
              "format": 1
            }
          ]
        },
        {
          "id": 2,
          "type": "table",
          "title": "Recent requests",
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 9 },
          "datasource": { "type": "grafana-clickhouse-datasource", "uid": "clickhouse" },
          "options": { "showHeader": true },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-clickhouse-datasource", "uid": "clickhouse" },
              "queryType": "table",
              "rawSql": "SELECT Timestamp, LogAttributes['org'] AS org, LogAttributes['user_email'] AS user_email, LogAttributes['gen_ai.request.model'] AS model, Body FROM otel.otel_logs ORDER BY Timestamp DESC LIMIT 100",
              "format": 1
            }
          ]
        }
      ],
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "__comment": "Attributes set by the telemetry AgentgatewayPolicy land in the LogAttributes Map(String,String) column. user_email + org are custom; gen_ai.request.model is emitted by agentgateway. Queries verified against the otel.otel_logs table the ClickHouse exporter auto-creates."
    }
  prometheus-requests.json: |
    {
      "uid": "agentgw-prometheus",
      "title": "Agentgateway — LLM usage (Prometheus)",
      "schemaVersion": 39,
      "version": 2,
      "editable": true,
      "time": { "from": "now-15m", "to": "now" },
      "refresh": "5s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total requests by team",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (org) (agentgateway_requests_total)",
              "legendFormat": "{{org}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total tokens by team",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (org) (agentgateway_gen_ai_client_token_usage_sum)",
              "legendFormat": "{{org}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Request rate by team (org)",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (org) (rate(agentgateway_requests_total[1m]))",
              "legendFormat": "{{org}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Token usage rate by team (org)",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (org) (rate(agentgateway_gen_ai_client_token_usage_sum[1m]))",
              "legendFormat": "{{org}}"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Token usage rate by model (gen_ai_request_model)",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (gen_ai_request_model, gen_ai_token_type) (rate(agentgateway_gen_ai_client_token_usage_sum[1m]))",
              "legendFormat": "{{gen_ai_request_model}} ({{gen_ai_token_type}})"
            }
          ]
        }
      ],
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "__comment": "Metric names verified against agentgateway v1.2.1 /metrics. The org label is added by the telemetry AgentgatewayPolicy. Stat panels show cumulative totals (non-zero even when idle); timeseries show live rates during traffic."
    }
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
  labels:
    app: grafana
